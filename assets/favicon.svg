<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#141a28"/>
      <stop offset="100%" stop-color="#080b10"/>
    </linearGradient>

    <linearGradient id="mainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4493f8"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4493f8" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#4493f8"/>
      <stop offset="75%"  stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="innerLight" cx="28%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="#4493f8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4493f8" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- Fundo -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)"/>
  <rect width="32" height="32" rx="8" fill="url(#innerLight)"/>
  <rect width="32" height="32" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Volume/fill do documento -->
  <path d="M8 9 a2 2 0 0 1 2-2 h9 l5 5 v12 a2 2 0 0 1-2 2 H10 a2 2 0 0 1-2-2 V9Z"
        fill="url(#mainGrad)" opacity="0.10"/>

  <!-- Contorno do documento -->
  <path d="M8 9 a2 2 0 0 1 2-2 h9 l5 5 v12 a2 2 0 0 1-2 2 H10 a2 2 0 0 1-2-2 V9Z"
        fill="none" stroke="url(#mainGrad)" stroke-width="1.2"
        filter="url(#glow)" stroke-linejoin="round"/>

  <!-- Dobra canto superior direito -->
  <path d="M19 7 L24 12 L19 12 Z"
        fill="url(#mainGrad)" opacity="0.35"/>
  <path d="M19 7 L24 12"
        fill="none" stroke="url(#mainGrad)" stroke-width="0.8" opacity="0.6"/>

  <!-- Linhas de texto internas -->
  <rect x="11" y="15" width="9" height="1.3" rx="0.65" fill="url(#lineGrad)" opacity="0.85"/>
  <rect x="11" y="18" width="7" height="1.3" rx="0.65" fill="url(#lineGrad)" opacity="0.65"/>
  <rect x="11" y="21" width="5" height="1.3" rx="0.65" fill="url(#lineGrad)" opacity="0.45"/>

  <!-- Badge verde (NF autorizada) -->
  <circle cx="25.5" cy="25.5" r="4.5" fill="#080b10" filter="url(#greenGlow)"/>
  <circle cx="25.5" cy="25.5" r="3.8" fill="#3fb950"/>
  <polyline points="23.2,25.5 24.8,27.1 27.8,23.9"
            fill="none" stroke="#fff" stroke-width="1.15"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
