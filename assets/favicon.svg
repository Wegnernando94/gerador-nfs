<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2230"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <!-- Text gradient: blue → purple (identidade do projeto) -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4493f8"/>
      <stop offset="60%"  stop-color="#5ba8ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4493f8" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#4493f8"/>
      <stop offset="70%"  stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#30363d" stroke-width="0.7"/>
  <!-- Top-left inner glow hint -->
  <circle cx="0" cy="0" r="18" fill="#4493f8" opacity="0.04"/>

  <!-- ── Letras SBN ── -->
  <text
    x="16" y="21"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="13"
    font-weight="700"
    letter-spacing="-0.5"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >SBN</text>

  <!-- ── Accent line abaixo do texto ── -->
  <rect x="6" y="23.5" width="20" height="1.5" rx="0.75" fill="url(#lineGrad)"/>

  <!-- ── Green dot (status autorizado) ── -->
  <circle cx="26.5" cy="7" r="3.2" fill="#0d1117"/>
  <circle cx="26.5" cy="7" r="2.6" fill="#3fb950"/>
  <circle cx="25.6" cy="6" r="0.8" fill="#fff" opacity="0.35"/>
</svg>
