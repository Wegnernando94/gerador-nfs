<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Enterprise NF-e Studio | QA Master v57</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Emissor NF-e Enterprise | Matrix v57</h1>
            <button class="btn btn-danger" onclick="location.reload()">LIMPAR TUDO</button>
        </header>
        
        <div class="main-grid">
            <div class="col">
                <section class="card">
                    <div class="card-header">1. Perfil Tributário Real</div>
                    <div class="grid-form">
                        <div class="field full">
                            <label>Cenário de Mercado</label>
                            <select id="perfilNota" onchange="recalc()">
                                <option value="NORMAL">Lucro Real/Presumido (Completa)</option>
                                <option value="SIMPLES">Simples Nacional (CSOSN 102)</option>
                                <option value="ST">Substituição Tributária (vST soma vNF)</option>
                                <option value="ISENTO">Isento/Imune (Sem valores de imposto)</option>
                                <option value="DEVOLUCAO">Devolução de Mercadoria (finNFe 4)</option>
                            </select>
                        </div>
                        <div class="field"><label>Número</label><input type="number" id="nNF" value="2528"></div>
                        <div class="field"><label>Série</label><input type="number" id="serie" value="901"></div>
                        <div class="field"><label>Emissão</label><input type="datetime-local" id="dhEmi"></div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">2. Envolvidos</div>
                    <div class="grid-form">
                        <div class="field full"><label>Emitente</label><input type="text" id="xNomeEmit" value="PES REPRESENTACOES LTDA"></div>
                        <div class="field"><label>CNPJ</label><input type="text" id="cnpjEmit" value="39493474000158"></div>
                        <hr class="full">
                        <div class="field full"><label>Destinatário</label><input type="text" id="xNomeDest" value="GLOBO COMUNICACAO S/A"></div>
                        <div class="field"><label>CNPJ</label><input type="text" id="cnpjDest" value="27865757000102"></div>
                    </div>
                </section>

                <section class="card financ">
                    <div class="card-header">3. Financeiro (Atalhos: 5x ou 30-60-90)</div>
                    <div class="flex-row">
                        <input type="text" id="regraManual" placeholder="Ex: 5x" style="flex:1;">
                        <button class="btn btn-primary" onclick="gerarFinanceiro()">GERAR PARCELAS</button>
                    </div>
                    <table id="tabelaDuplicatas">
                        <thead><tr><th>Parc.</th><th>Vencimento</th><th>Valor (R$)</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-header">4. Itens e Logística</div>
                    <button class="btn btn-success mb-10" onclick="addProduto()">+ NOVO ITEM</button>
                    <div id="listaProdutos"></div>
                    
                    <div class="grid-form mt-10">
                        <div class="field full"><label>Transportadora</label><input type="text" id="transpNome" value="NEVES TRANSPORTES"></div>
                        <div class="field"><label>Volumes</label><input type="number" id="qVol" value="1"></div>
                        <div class="field"><label>Frete (+)</label><input type="number" id="vFrete" value="0.00" oninput="recalc()"></div>
                    </div>
                </section>

                <section class="card summary-card">
                    <div class="summary-line"><span>vProd (Soma):</span><span id="resTotalProd">0.00</span></div>
                    <div class="summary-line"><span>vST (Retido):</span><span id="resTotalST">0.00</span></div>
                    <div class="summary-total"><span>TOTAL vNF:</span><span id="resTotalNota">0.00</span></div>
                </section>

                <button class="btn btn-primary btn-big" onclick="gerarXML()">GERAR XML OFICIAL (BUG HUNTER)</button>
                <button id="btnDownload" class="btn btn-success btn-big" style="display:none;" onclick="baixarXML()">BAIXAR XML</button>
            </div>
        </div>
        <textarea id="xml-output" readonly></textarea>
    </div>
    <script src="script.js"></script>
</body>
</html>
